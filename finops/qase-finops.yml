description: >-
  FinOps view of Qase spend. Qase is a per-seat SaaS: cost is driven primarily
  by the number of user licenses times the plan's per-user monthly rate (Free,
  Startup, Business, or custom Enterprise), billed monthly or annually with a 20
  percent annual discount. Secondary, usage-style costs come from AI credits
  (extra credits beyond the monthly allocation are billed per credit) and, on the
  Free tier, a monthly cap on API-published results that effectively bounds
  automation volume until you upgrade. The TestOps API carries no separate fee.
notes: >-
  Per-user rates and credit prices are list values captured on 2026-07-11 and
  not reconciled to a signed order. Verify on the Qase pricing page. The dominant
  cost lever is seat count and plan tier; AI credit overage ($0.40/credit) is a
  smaller usage-based component.
