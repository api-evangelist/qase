aid: qase
url: https://raw.githubusercontent.com/api-evangelist/qase/refs/heads/main/apis.yml
name: Qase
kind: company
description: >-
  Qase is a cloud test management platform (TestOps) for QA and engineering
  teams to author test cases, organize them into suites and plans, launch and
  complete test runs, publish automated results from CI pipelines, and track
  defects. The Qase TestOps API v1 is a token-authenticated REST API at
  https://api.qase.io/v1 covering Projects, Test Cases, Suites, Test Runs, Test
  Results, Defects, and Plans, with a machine-readable OpenAPI specification
  published on GitHub (qase-tms/specs) and pre-generated clients for PHP,
  Python, JavaScript/TypeScript, Java, and Go. Automation reporters use the bulk
  results endpoint to publish test run results directly from CI.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Test Runs
- Test Management
- Test Cases
- QA
- Testing
- TestOps
- Test Results
- Defects
- Quality Assurance
- Test Automation
created: '2026-07-11'
modified: '2026-07-11'
specificationVersion: '0.19'
apis:
- aid: qase:qase-test-runs-api
  name: Qase Test Runs API
  tags:
  - Test Runs
  - Runs
  - Test Execution
  - QA
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developers.qase.io/reference/get-runs
  baseURL: https://api.qase.io/v1
  properties:
  - url: https://developers.qase.io/reference/get-runs
    type: APIReference
  - url: https://developers.qase.io/docs/getting-started
    type: Documentation
  - url: openapi/qase-openapi.yml
    type: OpenAPI
  - url: collections/qase.postman_collection.json
    type: PostmanCollection
  - url: collections/qase.opencollection.json
    type: OpenCollection
  description: >-
    Create, list, retrieve, update, delete, and complete test runs in a project,
    and toggle a public shareable report link. A test run is an execution of a
    selected set of test cases; filter runs by status (in_progress, passed,
    failed, aborted), milestone, environment, and start-time window. Endpoints
    are scoped by project code at /run/{code} and /run/{code}/{id}.
- aid: qase:qase-test-results-api
  name: Qase Test Results API
  tags:
  - Test Results
  - Results
  - CI
  - Test Automation
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developers.qase.io/reference/create-result
  baseURL: https://api.qase.io/v1
  properties:
  - url: https://developers.qase.io/reference/create-result
    type: APIReference
  - url: openapi/qase-openapi.yml
    type: OpenAPI
  - url: collections/qase.postman_collection.json
    type: PostmanCollection
  - url: collections/qase.opencollection.json
    type: OpenCollection
  description: >-
    Publish and manage test run results - the pass/fail/blocked/skipped outcome
    of each executed case. Create a single result for a run, bulk-create many
    results in one request (the endpoint automation reporters use to push CI
    results), list results across runs, and get, update, or delete a result by
    run id and hash at /result/{code}.
