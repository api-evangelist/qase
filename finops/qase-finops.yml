  - project
principles:
- name: Visibility
  description: Track active seat count per plan and monitor AI-credit and API-result consumption against plan allowances.
- name: Allocation
  description: Map Qase projects and seats to teams or products so test management cost lands on the right cost center.
- name: Optimization
  description: Right-size seat count and plan tier, deactivate unused users, and stay within monthly AI-credit allocations to avoid $0.40/credit overage.
- name: Accountability
  description: Review seat utilization and credit overage each billing cycle; consolidate automation tokens to control API usage on capped tiers.
