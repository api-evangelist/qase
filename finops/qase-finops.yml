meters:
- name: user_seats
  description: Number of paid user licenses times the plan's per-user monthly rate.
  unit: users
  aggregation: sum
  dimensions:
  - account
  - plan
- name: ai_credits
  description: AI credits consumed; overage beyond the monthly allocation billed at $0.40 per credit.
  unit: credits
  aggregation: sum
  dimensions:
  - account
- name: api_results
  description: Test run results published via the API; capped at 25,000/month on the Free tier.
  unit: results
