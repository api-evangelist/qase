aid: qase
name: Qase
review:
  question: Does Qase expose a documented public WebSocket API?
  answer: false
  date: '2026-07-11'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Qase's public developer surface (the
    TestOps API v1 and v2) is request/response REST over HTTPS. There is no
    server-push transport (WebSocket or SSE) documented on Qase's own API to
    model. Qase does support outbound webhooks and CI/automation reporters that
    POST results to the REST API, but those are ordinary server-to-endpoint HTTP
    or client-initiated REST calls, not a bidirectional streaming channel.
findings:
  summary: |
    Qase does not publish a documented public WebSocket API. Qase is a cloud
    test management (TestOps) platform. Its public API is the TestOps API,
    served at base https://api.qase.io/v1 (v1) with a newer v2 also published,
    authenticated with an API token passed in the `Token` header. Every
    documented endpoint is request/response REST over HTTPS. Results from CI and
    automated tests are published by POSTing to the REST results endpoints
    (including a bulk endpoint); Qase also offers outbound webhooks for event
    notifications. No realtime, bidirectional, or streaming WebSocket
    (ws:// or wss://) endpoint is documented on Qase's own API as of the review
    date.
  openSource: |
    Qase the platform is a commercial SaaS (not open source), but Qase publishes
    its API specification and tooling openly on GitHub under the qase-tms
    organization: the OpenAPI source specification (qase-tms/specs), pre-generated
    API clients for PHP, Python, JavaScript/TypeScript, Java, and Go, and a large
    set of open-source test framework reporters (Playwright, Cypress, Jest, PyTest,
    JUnit, and more) that publish results to the REST API.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.qase.io/v1
      documented: true
      note: TestOps API v1. A v2 API is also published under the same host.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Outbound event webhooks POST to a configured HTTP endpoint. Server-to-endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Qase's API reference or developer docs as of the review date.
